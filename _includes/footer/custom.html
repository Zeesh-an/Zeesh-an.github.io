<!-- Support for MatJax -->

<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Plotly -->
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- Force links to open in a new tab except top navigation -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('a[href]').forEach((a) => {
      const href = a.getAttribute('href');
      if (!href) return;
      if (href.startsWith('#')) return;
      if (href.startsWith('mailto:') || href.startsWith('tel:')) return;
      if (href.startsWith('javascript:')) return;
      if (a.closest('.masthead')) return; // keep top tabs same-page

      a.setAttribute('target', '_blank');
      const existingRel = a.getAttribute('rel') || '';
      const relParts = new Set(existingRel.split(/\s+/).filter(Boolean));
      relParts.add('noopener');
      relParts.add('noreferrer');
      a.setAttribute('rel', Array.from(relParts).join(' '));
    });
  });
</script>

<!-- end custom footer snippets -->
